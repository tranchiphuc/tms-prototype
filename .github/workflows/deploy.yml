name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 16 for build
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        timeout-minutes: 8
        run: npm run build
        env:
          GENERATE_SOURCEMAP: false  # keep this, removes this env var only

      - name: Setup Node 22 for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
